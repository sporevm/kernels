steps:
  - label: ":penguin: Build SporeVM kernel"
    key: build-sporevm
    command: "scripts/ci-build-kernel-asset.sh"
    artifact_paths: "dist/kernels/*"
    timeout_in_minutes: 45
    cache:
      paths:
        - ".kernel-cache/sporevm/"
      key: "v1-sporevm-kernel-6.1.155"
    agents:
      queue: hosted

  - label: ":penguin: Build SporeVM x86_64 kernel"
    key: build-sporevm-x86-64
    command: "SPOREVM_KERNEL_ARCH=x86_64 scripts/ci-build-kernel-asset.sh"
    artifact_paths: "dist/kernels/*"
    timeout_in_minutes: 45
    cache:
      paths:
        - ".kernel-cache/sporevm-x86_64/"
      key: "v1-sporevm-kernel-x86_64-6.1.155"
    agents:
      queue: hosted

  - wait

  - label: ":rocket: Publish release"
    command: |
      if [[ -z "$${BUILDKITE_TAG:-}" ]]; then
        echo "Skipping release publish because this is not a tagged build"
        exit 0
      fi
      scripts/ci-publish-release.sh
    agents:
      queue: hosted
