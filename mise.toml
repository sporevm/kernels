[tools]
shellcheck = "0.11.0"
svu = "3.4.0"

[tasks.lint]
description = "Lint shell scripts"
run = "shellcheck -x scripts/*.sh"

[tasks.syntax]
description = "Check shell script syntax"
run = "bash -n scripts/*.sh"

[tasks.test]
description = "Run focused script tests"
run = "scripts/test-kernel-architecture.sh"

[tasks.check]
description = "Run local checks"
depends = ["lint", "syntax", "test"]
run = "true"

[tasks.release]
description = "Tag the next version and push to trigger a release"
depends = ["check"]
run = "scripts/release.sh"
